    #xtitle: '#it{x}_{J,#gamma}'
    pt_gamma_bin3: [100., 158.]
    #logy: False
    #hepdata_pp_gname: 'Graph1D_y1'
    #ytitle_pp: '#frac{1}{N_#gamma}#frac{dN}{dx_{J#gamma}}'
    xj_gamma_bins_3: [0.32, 0.35, 0.40, 0.45, .50, .56, .63, .71, .79, .89, 1.00, 1.12, 1.26, 1.41, 1.58, 1.78, 2.00]

    # Fig 7; pt_gamma=158-200 GeV, both pp and PbPb
    # https://www.hepdata.net/record/ins1694678?version=1&table=Table%204
    #xtitle: '#it{x}_{J,#gamma}'
    pt_gamma_bin4: [158., 200]
    #logy: False
    #hepdata_pp_gname: 'Graph1D_y1'
    #ytitle_pp: '#frac{1}{N_#gamma}#frac{dN}{dx_{J#gamma}}'
    xj_gamma_bins_4: [0.20, 0.25, 0.32, 0.40, 0.50, 0.63, 0.79, 1.00, 1.26, 1.58, 2.00]

    # HEPData v2 - need to interpret the above and update our mapping...
    data:
