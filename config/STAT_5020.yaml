                    index: "1"
                  - parameters: { centrality: "5_10" }
                    index: "2"
                  - parameters: { centrality: "10_20" }
                    index: "3"
                  - parameters: { centrality: "20_30" }
                    index: "4"
                  - parameters: { centrality: "30_40" }
                    index: "5"
                  - parameters: { centrality: "40_50" }
                    index: "6"
          ratio:
            quantity: pt_ch
            x_axis:
              label: "#it{p}_{T} (GeV/#it{c})"
            y_axis:
              label: "#it{R}_{AA}"
              log: true
            tables:
              - parameters: {}
                # HEPData ins1657384 publishes lumped stat + sys per-bin for RAA.
