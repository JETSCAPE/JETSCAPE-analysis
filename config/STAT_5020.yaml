    #hepdata_AA_distribution_hname: ["Hist1D_y1", "Hist1D_y2", "Hist1D_y3", "Hist1D_y4", "Hist1D_y5", "Hist1D_y6"]
    #ytitle_AA_distribution: "#frac{1}{#it{N}_{event}} #frac{d^{2}#it{N}}{d#it{p}_{T}d#it{#eta}} #left[(GeV/c)^{-1}#right]"

    data:
      pp:
        hepdata:
          record:
            inspire_hep_id: 1657384
            version: 1
          spectra:
            quantity: pt_ch
            x_axis:
              label: "#it{p}_{T} (GeV/#it{c})"
            y_axis:
              label: "#frac{1}{#it{N}_{event}} #frac{d^{2}#it{N}}{d#it{p}_{T}d#it{#eta}} #left[(GeV/c)^{-1}#right]"
              range: ["2e-8", "1e4"]
