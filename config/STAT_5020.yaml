              range: [0.0, 1.9]
              log: true
            tables:
              - parameters: { centrality: "0_10", jet_R: "0.4" }
                # HEPData ins1673184 Table 27 (rapidity-dependent RAA ratio, 4 jet-pT bins).
                # Only lumped stat + sys are published for this ratio quantity.
                systematics_names: {stat: stat, sys: sys}
                additional_systematics: {}
                table: Table 27
                combinations:
                  - parameters: { jet_pt: 158.0_200.0 }
                    index: "1"
                  - parameters: { jet_pt: 200.0_251.0 }
                    index: "2"
                  - parameters: { jet_pt: 251.0_316.0 }
