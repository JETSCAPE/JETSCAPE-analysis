                # (constant across pT, varies across centralities), encoded below as
                # `additional_systematics: {norm: <frac>}` per combination. Values quoted
                # verbatim from the HEPData submission.yaml description.
                systematics_names: {stat: stat, sys: sys}
                additional_systematics: {}
                table: Table 8
                combinations:
                  - parameters: { centrality: "0_5" }
                    index: "1"
                    additional_systematics: { norm: 0.027 }
                  - parameters: { centrality: "5_10" }
                    index: "2"
                    additional_systematics: { norm: 0.035 }
                  - parameters: { centrality: "10_20" }
                    index: "3"
                    additional_systematics: { norm: 0.035 }
                  - parameters: { centrality: "20_30" }
                    index: "4"
                    additional_systematics: { norm: 0.041 }
                  - parameters: { centrality: "30_40" }
                    index: "5"
                    additional_systematics: { norm: 0.037 }
                  - parameters: { centrality: "40_50" }
                    index: "6"
                    additional_systematics: { norm: 0.039 }

