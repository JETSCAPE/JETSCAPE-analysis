#------------------------------------------------------------------
# coincidence observables – gamma+jet
#------------------------------------------------------------------
gamma_trigger_jet:
  # ATLAS gamma-tagged jet RAA
  pt_atlas:
    enabled: false
    urls:
      inspire_hep: https://inspirehep.net/literature/2648097
      hepdata: https://www.hepdata.net/record/ins2648097

    centrality: [[0, 10], [10, 30]]
    trigger:
      eta: 2.37
      pt: [50.0, null]
      isolation:
        type: "full"
        R: 0.3
        Et_max_pp: 3.
        Et_max_AA: 10. # TODO see if we have to change this to 3 as well due to lack of UE
    jet:
      R: [0.4]
      eta: 2.8
      pt: [50., 320.]
    dPhi: 7./8. # dPhi > 7/8*pi

    hepdata: "HEPData-ins2648097-v1-root.root"

    xtitle: "#it{p}_{T,jet} (GeV/#it{c})"
    logy: True

    ## Fig 3
    ## https://www.hepdata.net/record/ins2648097?version=1&table=Figure%203
    #hepdata_pp_dir: "Figure 3"
    #hepdata_pp_gname: "Graph1D_y1"
    #hepdata_pp_hname: "Hist1D_y1"
    #ytitle_pp: "#frac{d^{2}#sigma}{d#it{p}_{T}d#it{#eta}} #left[mb/(GeV/c)^{-1}#right]"
    #y_min_pp: 3e-4
    #y_max_pp: 2e-2

    # bins: [50., 56., 63., 70., 79., 89., 100., 112., 125., 141., 158., 177., 199., 223., 251., 281., 360.]

    # Isolation in PbPb (text from paper): “Thus, in Pb+Pb collisions, the isolation energy requirement depends
    # continuously on the centrality of the event and is chosen so that its efficiency for prompt
    # photons is 90%, as determined from simulations of photon+jet events overlaid with Pb+Pb
    # minimum-bias data (described in Section 4 below). This upper limit on the isolation energy is
    # approximately 10 GeV in 0–10% Pb+Pb events, but quickly decreases in more peripheral
    # events and converges to the pp value.

    ## Fig 4 (PbPb)
    ## https://www.hepdata.net/record/ins2648097?version=1&table=Figure%204
    #hepdata_AA_dir: "Figure 4"
    #hepdata_AA_gname: ["Graph1D_y1", "Graph1D_y2", "Graph1D_y3"] # one per centrality bin
    #hepdata_AA_hname: ["Hist1D_y1", "Hist1D_y2", "Hist1D_y3"]
    #ytitle_AA: "#frac{d^{2}#sigma}{d#it{p}_{T}d#it{#eta}} #left[mb/(GeV/c)^{-1}#right]"
    #y_min_AA: 3e-6
    #y_max_AA: 10.

    data:
      pp:
        hepdata:
          record:
            inspire_hep_id: 2648097
            version: 1
          spectra:
            quantity: pt
            x_axis:
              label: "#it{p}_{T,jet} (GeV/#it{c})"
            y_axis:
              label: "#frac{d^{2}#sigma}{d#it{p}_{T}d#it{#eta}} #left[mb/(GeV/c)^{-1}#right]"
              range: ["3e-4", "2e-2"]
            tables:
              - parameters: { centrality: ["0_10", "10_30"] }
                systematics_names: {}
                additional_systematics: {}
                table: Figure 3
                index: "1"
      AA:
        hepdata:
          record:
            inspire_hep_id: 2648097
            version: 1
          spectra:
            quantity: pt
            x_axis:
              label: "#it{p}_{T,jet} (GeV/#it{c})"
            y_axis:
              label: ""
              log: true
            tables:
              - parameters: { centrality: ["0_10", "10_30"] }
                systematics_names: {}
                additional_systematics: {}
                table: ""
                index: ""
          ratio:
            quantity: pt
            x_axis:
              label: "#it{p}_{T,jet} (GeV/#it{c})"
            y_axis:
              label: "#frac{d^{2}#sigma}{d#it{p}_{T}d#it{#eta}} #left[mb/(GeV/c)^{-1}#right]"
              range: ["3e-6", 10.0]
              log: true
            tables:
              - parameters: {}
                systematics_names: {}
                additional_systematics: {}
                table: Figure 4
                combinations:
                  - parameters: { centrality: "0_10" }
                    index: "1"
                  - parameters: { centrality: "10_30" }
                    index: "2"

