                additional_systematics: {}
                table: Table 27
                combinations:
                  - parameters: { jet_pt: 158.0_200.0 }
                    index: "1"
                  - parameters: { jet_pt: 200.0_251.0 }
                    index: "2"
                  - parameters: { jet_pt: 251.0_316.0 }
                    index: "3"
                  - parameters: { jet_pt: 316.0_562.0 }
