#------------------------------------------------------------------
# Z boson triggered hadron observables
#------------------------------------------------------------------
z_trigger_hadron:
  # ATLAS z boson-hadron correlations
  IAA_pt_atlas:
    enabled: true
    urls:
      inspire_hep: https://inspirehep.net/literature/1812957
      hepdata: N/A
      custom: TODO

    centrality: [[0, 10], [10, 30]]
    trigger:
      # This analysis uses Z->ll, so need to specify both electrons and muons.
      # Electrons
      electron:
        pt: [20., null]
        # NOTE: electrons from 1.37 < |eta| < 1.52 are excluded experimentally due to detector
        #       acceptance. This is trickier to encode here, so we'll just encode it in
        #       the implementation.
        eta: 2.47
      # Muons
      muon:
        pt: [20., null]
        eta: 2.5
      # Z candidates
      mass: [76., 106.]
      pt: [15., null]
      # NOTE: There is no explicitly specific Z rapidity requirement, so we do not apply one here.
    hadron:
      pt: [1., null]
      eta: 2.5
    dPhi: 3./4. # dPhi > 3/4*pi

    # TODO(RJE): Add binning

  # CMS xi (fragmentation)
  # Observables: xi_T^trk,Z , dphi
  xi_cms:
    enabled: false
    urls:
      inspire_hep: https://inspirehep.net/literature/1850859
      hepdata: https://www.hepdata.net/record/ins1850859

    centrality: [[0, 30], [30, 50]]
