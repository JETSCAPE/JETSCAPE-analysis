    #logy: True

    #hepdata_pp_dir: "Table 4"
    #hepdata_pp_gname: "Graph1D_y1"
    #ytitle_pp: "#frac{1}{#it{N}_{event}} #frac{d^{2}#it{N}}{d#it{p}_{T}d#it{#eta}} #left[(GeV/c)^{-1}#right]"
    #y_min_pp: 2e-8
    #y_max_pp: 1e4

    #hepdata_AA_dir: "Table 8"
