            y_axis:
              label: "#frac{1}{N_#gamma}#frac{dN}{dx_{J#gamma}}"
            tables:
              - parameters:
                  {
                    centrality: ["0_10", "10_20", "20_30", "30_50", "50_80"],
                    gamma_trigger_pt: [100.0_158.0, 158.0_200.0, 63.0_80.0, 80.0_100.0],
