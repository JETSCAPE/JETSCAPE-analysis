#------------------------------------------------------------------
# Inclusive jet observables -- charged jets
#------------------------------------------------------------------
inclusive_chjet:
  # ALICE charged jet RAA (ML background subtraction)
  pt_alice:
    enabled: true
    urls:
      inspire_hep: https://inspirehep.net/literature/2637686
      hepdata: https://www.hepdata.net/record/ins2637686

    centrality: [[0, 10], [30, 50]]
    jet:
      R: [0.2, 0.4, 0.6]
      pt: [20., 140.]
      eta_R: 0.9 # 0.9 - R

    # hepdata: "HEPData-ins2637686-v1-root.root"

    # xtitle: "#it{p}_{T,jet} (GeV/#it{c})"
    # logy: True

    # ytitle_pp: "R_{AA}(#it{p}_{T,jet})"
    # y_min_pp: 0.1
    # y_max_pp: 1.5
    # skip_pp: True

    data:
      pp:
        hepdata:
          record:
            inspire_hep_id: 2637686
            version: 1
          spectra:
            quantity: pt
            x_axis:
              label: "#it{p}_{T,jet} (GeV/#it{c})"
            y_axis:
              label: R_{AA}(#it{p}_{T,jet})
              range: [0.1, 1.5]
            tables:
              - parameters: { centrality: ["0_10", "30_50"], jet_R: ["0.2", "0.4", "0.6"] }
                systematics_names: {}
                additional_systematics: {}
                table: ""
                index: ""
      AA:
        hepdata:
          record:
            inspire_hep_id: 2637686
            version: 1
          spectra:
            quantity: pt
            x_axis:
              label: "#it{p}_{T,jet} (GeV/#it{c})"
            y_axis:
              label: ""
              log: true
            tables:
              - parameters: { centrality: ["0_10", "30_50"], jet_R: ["0.2", "0.4", "0.6"] }
                systematics_names: {}
                additional_systematics: {}
                table: ""
                index: ""
          ratio:
            quantity: pt
            x_axis:
              label: "#it{p}_{T,jet} (GeV/#it{c})"
            y_axis:
              label: "#it{R}_{AA}"
              log: true
            # HEPData ins2637686 provides two subtraction methods (ML, AB); per the ALICE
            # recommendation we use the ML-subtraction tables. Only lumped stat + sys are
            # published. Each table's error labels embed the R/centrality tag and even mix
            # "Semi Central" (stat) vs "SemiCentral" (sys) spellings, so systematics_names
            # is placed per-combination to override the (empty) top-level mapping.
            # Note: R=0.6, 30-50% ML is not published — for that single combination we
            # fall back to the AB-subtraction table (Figure 4c middle AB).
            tables:
              - parameters: {}
                systematics_names: {}
                additional_systematics: {}
                index: "1"
                combinations:
                  - parameters: { centrality: "0_10", jet_R: "0.2" }
                    table: "Figure 4a top ML"
                    systematics_names:
                      {"Raa, R = 0.2, Central, ML, statistical uncertainty": stat,
                       "Raa, R = 0.2, Central, ML, systematic uncertainty": sys}
                  - parameters: { centrality: "0_10", jet_R: "0.4" }
                    table: "Figure 4b top ML"
                    systematics_names:
                      {"Raa, R = 0.4, Central, ML, statistical uncertainty": stat,
                       "Raa, R = 0.4, Central, ML, systematic uncertainty": sys}
                  - parameters: { centrality: "0_10", jet_R: "0.6" }
                    table: "Figure 4c top ML"
                    systematics_names:
                      {"Raa, R = 0.6, Central, ML, statistical uncertainty": stat,
                       "Raa, R = 0.6, Central, ML, systematic uncertainty": sys}
                  - parameters: { centrality: "30_50", jet_R: "0.2" }
                    table: "Figure 4a middle ML"
                    systematics_names:
                      {"Raa, R = 0.2, Semi Central, ML, statistical uncertainty": stat,
                       "Raa, R = 0.2, SemiCentral, ML, systematic uncertainty": sys}
                  - parameters: { centrality: "30_50", jet_R: "0.4" }
                    table: "Figure 4b middle ML"
                    systematics_names:
                      {"Raa, R = 0.4, Semi Central, ML, statistical uncertainty": stat,
                       "Raa, R = 0.4, SemiCentral, ML, systematic uncertainty": sys}
                  - parameters: { centrality: "30_50", jet_R: "0.6" }
                    table: "Figure 4c middle AB"
                    systematics_names:
                      {"Raa, R = 0.6, Semi Central, AB, statistical uncertainty": stat,
                       "Raa, R = 0.6, SemiCentral, AB, systematic uncertainty": sys}

  # ALICE charged jet RAA, mixed-event background subtraction.
  # Preliminary as of August 2025.
  pt_mixed_events_alice:
    enabled: false
    urls:
      inspire_hep: N/A
      hepdata: N/A
      custom: https://indico.cern.ch/event/1403965/contributions/6068888/attachments/2936841/5158616/SoftJet28Sep2024_NadineGruenwald.pdf

