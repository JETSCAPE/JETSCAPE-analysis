        # We should take guidance from the isolation used for the theory calculations in their comparison
        # which is: deltaR < 0.4 and sum of all partons within cone required to be below 5 GeV.
        # Probably what we should do in jetscape is calculated for all charged and neutral particles
        # sum of pt in cone and then subtract and UE estimate from isolation quantity … this is the easiest I can think of.
        type: "full"
        R: 0.4
        Et_max_pp: 5.0 # GeV
        Et_max_AA: 5.0 # GeV
    jet:
      R: [0.3]
      pt: [30., null] # GeV
      eta: 1.6 # |eta| < 1.6
    dPhi: 7./8. # dPhi > 7/8*pi

    # track selection
